<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JWT Debugger - GUMA™</title>
  <link rel="icon" href="../../favicon.svg" />
  <link rel="stylesheet" href="../tool.css" />
  <style>
    .container { max-width: 900px; margin: 0 auto; padding: 20px 14px; }
    .header { text-align: center; margin-bottom: 32px; }
    .title { font-size: 28px; font-weight: 800; margin: 0 0 8px; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .subtitle { color: var(--muted); font-size: 14px; margin: 0; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    .section { margin-bottom: 24px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 12px; padding-left: 2px; }
    textarea { width: 100%; height: 250px; background: var(--input-bg); color: var(--text); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 13px; outline: none; transition: all 0.2s; resize: vertical; font-family: ui-monospace, monospace; }
    textarea:focus { border-color: rgba(var(--accent-rgb), 0.42); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent); }
    pre { white-space: pre-wrap; word-wrap: break-word; background: var(--panel); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; font-size: 13px; font-family: ui-monospace, monospace; min-height: 100px; }
    .signature-input { width: 100%; background: var(--input-bg); color: var(--text); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 13px; outline: none; transition: all 0.2s; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">
        <span>&#x1F511;</span>
        <span>JWT Debugger</span>
      </h1>
      <p class="subtitle">JSON Web Token을 디코딩하고 분석합니다.</p>
    </div>

    <div class="main-grid">
      <div class="panel">
        <div class="section">
          <h2 class="section-title">Encoded JWT</h2>
          <textarea id="jwt-input" placeholder="여기에 JWT를 붙여넣으세요..." oninput="decodeJWT()"></textarea>
        </div>
      </div>
      <div class="panel">
        <div class="section">
          <h2 class="section-title">Decoded</h2>
          
          <h3 class="section-title" style="margin-top: 16px;">Header</h3>
          <pre id="header-output">{...}</pre>
          
          <h3 class="section-title" style="margin-top: 16px;">Payload</h3>
          <pre id="payload-output">{...}</pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Theme management
    function applyTheme() {
      if(localStorage.getItem('theme') === 'dark'){
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
      }
    }
    applyTheme();
    window.addEventListener('storage', (e) => (e.key === 'theme') && applyTheme());
    window.addEventListener('message', (e) => (e.data && e.data.type === 'themeChange') && applyTheme());

    const jwtInput = document.getElementById('jwt-input');
    const headerOutput = document.getElementById('header-output');
    const payloadOutput = document.getElementById('payload-output');

    function base64UrlDecode(str) {
      let output = str.replace(/-/g, '+').replace(/_/g, '/');
      switch (output.length % 4) {
        case 0: break;
        case 2: output += '=='; break;
        case 3: output += '='; break;
        default: throw 'Illegal base64url string!';
      }
      return decodeURIComponent(atob(output).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
    }

    function decodeJWT() {
      const token = jwtInput.value;
      if (!token || token.split('.').length !== 3) {
        headerOutput.textContent = '{...}';
        payloadOutput.textContent = '{...}';
        return;
      }

      const [header, payload, signature] = token.split('.');

      try {
        const decodedHeader = JSON.parse(base64UrlDecode(header));
        headerOutput.textContent = JSON.stringify(decodedHeader, null, 2);
      } catch (e) {
        headerOutput.textContent = 'Invalid Header: ' + e.message;
      }

      try {
        const decodedPayload = JSON.parse(base64UrlDecode(payload));
        payloadOutput.textContent = JSON.stringify(decodedPayload, null, 2);
      } catch (e) {
        payloadOutput.textContent = 'Invalid Payload: ' + e.message;
      }
    }
  </script>
</body>
</html>
