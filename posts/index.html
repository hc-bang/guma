<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GUMA™ 문서</title>
  <link rel="icon" href="../favicon.svg" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../config/config.css" />
  <link rel="stylesheet" href="../shared/tree.css" />
</head>

<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="title"><span class="title-icon icon-svg" aria-hidden="true"><svg width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14,2 14,8 20,8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <line x1="10" y1="9" x2="8" y2="9" />
          </svg></span>문서</h1>
    </div>
    <div class="topbar-right">
      <a class="btn icon-btn" href="../" aria-label="홈으로"><span class="icon-svg" aria-hidden="true"><svg width="15"
            height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9,22 9,12 15,12 15,22" />
          </svg></span></a>
      <button id="themeToggle" class="btn icon-btn" type="button" aria-label="모드 토글"><span class="icon-svg"
          aria-hidden="true"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg></span></button>
      <button id="openSidepanel" class="btn icon-btn" type="button" aria-label="메뉴"><span class="icon-svg"
          aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg></span></button>
    </div>
  </header>

  <div id="sidepanelOverlay" class="sidepanel-overlay"></div>
  <aside id="sidepanel" class="sidepanel" aria-label="메뉴">
    <div class="sidepanel-title">메뉴</div>
    <div id="sidepanel-nav" class="sidepanel-actions"></div>
  </aside>

  <main class="container docs">
    <aside class="panel docs-left" aria-label="문서 목록">
      <div class="docs-left-title">
        <span class="docs-left-title-icon icon-svg" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg></span>
        <span class="docs-left-title-text">목록</span>
      </div>
      <div id="postContainer" class="post-list">
        <p class="tree-loading">목록을 불러오는 중...</p>
      </div>
    </aside>

    <section class="panel docs-right">
      <article id="md" class="markdown-body viewer-markdown">
        <p class="hint">문서를 선택하세요.</p>
      </article>
    </section>
  </main>

  <link id="theme-md-light" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-light.min.css" />
  <link id="theme-md-dark" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-dark.min.css" />
  <link id="theme-hl-light" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <link id="theme-hl-dark" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>

  <script src="../shared/tree.js"></script>
  <script>
    const container = document.getElementById('postContainer');
    const mdEl = document.getElementById('md');

    // ── 유틸 ───────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&')
        .replace(/</g, '<')
        .replace(/>/g, '>')
        .replace(/"/g, '"')
        .replace(/'/g, '&#039;');
    }

    function setTitle(file) {
      const name = (file || '').split('/').pop().replace(/\.md$/i, '').replace(/[-_]+/g, ' ').trim() || '문서';
      document.title = `GUMA™ 문서 - ${name}`;
    }

    function getFileParam() {
      return new URLSearchParams(location.search).get('file') || '';
    }

    function setFileParam(file) {
      const u = new URL(location.href);
      if (file) u.searchParams.set('file', file);
      else u.searchParams.delete('file');
      history.pushState({ file }, '', u);
    }

    // ── Marked 설정 ────────────────────────────────────────
    function setupMarked() {
      if (!window.marked) return;
      marked.setOptions({
        gfm: true,
        breaks: false,
        headerIds: true,
        mangle: false,
        highlight(code, lang) {
          try {
            if (window.hljs) {
              if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
              return hljs.highlightAuto(code).value;
            }
          } catch (e) { }
          return escapeHtml(code);
        }
      });
    }

    // ── MD 로드 & 렌더 ─────────────────────────────────────
    async function loadMd(file) {
      if (!mdEl) return;
      if (!file) {
        mdEl.innerHTML = '<p class="hint">문서를 선택하세요.</p>';
        setTitle('');
        return;
      }

      setTitle(file);
      mdEl.innerHTML = '<p class="hint">불러오는 중...</p>';

      try {
        const rawUrl = `./${file}`;
        const res = await fetch(rawUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();

        if (!window.marked) {
          mdEl.innerHTML = `<pre>${escapeHtml(text)}</pre>`;
          return;
        }

        setupMarked();
        mdEl.innerHTML = marked.parse(text);

        try {
          if (window.hljs) {
            mdEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
          }
        } catch (e) { }

        mdEl.querySelectorAll('a[href]').forEach(a => {
          if (/^https?:\/\//i.test(a.getAttribute('href') || '')) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
          }
        });

        // 뷰어 내 스크롤만 맨 위로 (페이지 스크롤 변경 없음)
        mdEl.parentElement.scrollTop = 0;

      } catch (e) {
        mdEl.innerHTML = `
          <h2>문서를 불러올 수 없습니다</h2>
          <p>파일: <code>${escapeHtml(file)}</code></p>
          <p style="opacity:.75">에러: ${escapeHtml(e?.message || String(e))}</p>`;
      }
    }

    // ── 활성 항목 표시 ─────────────────────────────────────
    function setActive(file) {
      container.querySelectorAll('a.tree-file').forEach(a => {
        a.classList.toggle('active', a.dataset.file === file);
      });
    }

    /* index.json entries를 { file, display, group } 형태로 정규화한다. */
    function normalizeIndexFiles(raw) {
      if (!raw || !Array.isArray(raw.files)) return [];
      return raw.files.map(item => ({
        file: String(item.file || ''),
        display: item.display || undefined,
        group: item.group || undefined
      })).filter(e => e.file);
    }

    // ── 트리 렌더링 (GTree 공통 모듈 사용) ────────────────────
    function renderPostTree(tree) {
      return GTree.renderTree(tree, {
        onLeaf: (key, item, parentPath) => {
          const meta = item.__meta || {};
          const filePath = meta.file || (parentPath + key);
          const label = (meta.display && String(meta.display)) || key.replace(/\.md$/i, '');
          const a = GTree.createFileLink(label);
          a.dataset.file = filePath;
          a.href = `?file=${encodeURIComponent(filePath)}`;
          a.onclick = e => {
            e.preventDefault();
            setFileParam(filePath);
            setActive(filePath);
            loadMd(filePath);
          };
          return a;
        }
      });
    }

    // ── 초기 로드(인덱스 JSON 우선 사용, 이후 실패 시 에러 표시) ──────────────────────────────────────────
    async function fetchPosts() {
      try {
        let files = [];

        // 1) 로컬 인덱스 파일 시도
        try {
          const jsonRes = await fetch('./index.json', { cache: 'no-store' });
          if (jsonRes.ok) {
            const j = await jsonRes.json();
            if (j) {
              const entries = normalizeIndexFiles(j);
              files = Array.isArray(entries) ? entries.slice() : [];
            }
          }
        } catch (e) {
          // 로컬 인덱스 로드 실패 — 의도적으로 무시하고 이후 처리로 넘어감
          files = [];
        }

        // 2) index.json에 유효한 항목이 없으면 목록이 비어있다고 처리
        if (!files || files.length === 0) {
          container.innerHTML = '<p class="tree-empty">등록된 문서가 없습니다.</p>';
          return;
        }

        // 트리 빌드 및 렌더링 (GTree 공통 모듈 사용)
        const tree = GTree.buildTreeFromEntries(files);
        container.innerHTML = '';
        container.appendChild(renderPostTree(tree));

        const initial = getFileParam();
        if (initial) {
          setActive(initial);
          await loadMd(initial);
          // 초기 파일의 상위 폴더 자동 펼치기
          GTree.expandToActive(container, a => a.dataset.file === initial);
        }
      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <p class="tree-empty tree-error">
            <strong>오류:</strong> ${escapeHtml(err.message || '문서 목록을 불러올 수 없습니다.')}
          </p>`;
      }
    }

    window.addEventListener('popstate', (e) => {
      const f = (e.state && e.state.file) ? e.state.file : getFileParam();
      setActive(f);
      loadMd(f);
    });

    fetchPosts();
  </script>



  <style>
    /* ── 레이아웃 ───────────────────────────────────────── */
    .container.docs {
      max-width: 100%;
      width: 100%;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    @media (max-width: 900px) {
      .container.docs {
        grid-template-columns: 1fr;
      }
    }

    .docs-left {
      position: sticky;
      top: 56px;
      max-height: calc(100dvh - 72px);
      overflow: auto;
      padding: 10px;
    }

    @media (max-width: 900px) {
      .docs-left {
        position: static;
        max-height: none;
      }
    }

    .docs-left-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 2px 2px 10px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--accent) 6%, var(--panel));
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 13px;
      user-select: none;
    }

    .docs-left-title-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
    }

    .docs-right {
      min-height: calc(100dvh - 110px);
      padding: 14px;
    }

    /* 트리 스타일은 shared/tree.css에서 관리합니다. */
    .post-list {
      margin: 0;
      padding: 0;
      width: 100%;
    }

    /* ── 뷰어 ─────────────────────────────────────────── */
    .viewer-markdown.markdown-body {
      color: var(--text);
      background: transparent;
    }

    .viewer-markdown {
      padding: 0;
    }

    .viewer-markdown pre {
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
    }

    .viewer-markdown code {
      border-radius: 8px;
    }
  </style>
  <script>window.GUMA = { root: '../', page: 'posts' };</script>
  <script src="../shared/topbar.js" defer></script>
</body>

</html>
