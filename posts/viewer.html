<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>문서 보기</title>

  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="./viewer.css" />

  <!-- GitHub 스타일 마크다운 (테마별 분리) -->
  <link id="theme-md-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-light.min.css" />
  <link id="theme-md-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-dark.min.css" />

  <!-- 코드 하이라이트 (테마별 분리) -->
  <link id="theme-hl-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <link id="theme-hl-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <header class="topbar viewer-topbar">
    <div class="topbar-left viewer-topbar-left">
      <h1 class="title viewer-title"><span class="title-icon" aria-hidden="true">📄</span><span id="docTitle">문서 보기</span></h1>
    </div>
    <div class="topbar-right viewer-topbar-right">
      <a class="btn" href="./index.html">목록</a>
      <a class="btn" href="../index.html">🏠</a>
    </div>
  </header>

  <main class="container viewer-container">
    <section class="panel viewer-panel">
      <article id="md" class="markdown-body viewer-markdown">
        <p class="viewer-loading">불러오는 중...</p>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script src="./viewer.js"></script>
</body>
</html>
